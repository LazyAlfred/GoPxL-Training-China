<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; }
        #info { position: absolute; top: 10px; left: 10px; color: #888; font-size: 12px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="loading">正在加载点云数据 (6.6MB)...</div>
    <div id="info">左键旋转 | 右键平移 | 滚轮缩放</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 10000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        
        // 自动识别路径：尝试当前目录或上级目录
        const dataPath = 'points.json'; 

        fetch(dataPath)
            .then(res => {
                if (!res.ok) throw new Error("无法找到 points.json");
                return res.json();
            })
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(data.length * 3);
                const colors = new Float32Array(data.length * 3);
                
                let minZ = Infinity, maxZ = -Infinity;
                data.forEach(p => {
                    if (p[2] < minZ) minZ = p[2];
                    if (p[2] > maxZ) maxZ = p[2];
                });

                data.forEach((p, i) => {
                    positions[i * 3] = p[0];
                    positions[i * 3 + 1] = p[1];
                    positions[i * 3 + 2] = p[2];
                    
                    const t = (p[2] - minZ) / (maxZ - minZ || 1);
                    const color = new THREE.Color();
                    // 经典的 Gocator 彩虹色映射
                    color.setHSL(0.66 * (1 - t), 1.0, 0.5);
                    colors[i * 3] = color.r;
                    colors[i * 3 + 1] = color.g;
                    colors[i * 3 + 2] = color.b;
                });

                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                geometry.computeBoundingSphere(); // 关键：计算包围球

                // 调整点的大小，6.6MB 大约有 20 万个点，size 设为 0.1 比较合适
                const material = new THREE.PointsMaterial({ 
                    size: 0.2, 
                    vertexColors: true,
                    sizeAttenuation: true // 随距离缩放
                });
                
                const points = new THREE.Points(geometry, material);
                scene.add(points);

                // --- 自动对焦逻辑 ---
                const center = geometry.boundingSphere.center;
                const radius = geometry.boundingSphere.radius;
                
                controls.target.set(center.x, center.y, center.z);
                camera.position.set(center.x, center.y, center.z + radius * 2);
                camera.far = radius * 10;
                camera.updateProjectionMatrix();
                controls.update();

            })
            .catch(err => {
                document.getElementById('loading').innerText = "加载失败: " + err.message;
            });

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
