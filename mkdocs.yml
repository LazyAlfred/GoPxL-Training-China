site_name: GoPxL 培训手册
site_url: https://LazyAlfred.github.io/GoPxL-Training-China/

nav:
  - 首页: index.md
  - 1️⃣ 准备工作:
      - 传感器选型: sensor.md
      - 软件环境介绍: gopxl_introduction.md
  - 2️⃣ 基础操作:
      - 快速指南: gopxl_quickstart.md
      - 扫描成像: gopxl_scan.md
      - 工具介绍: gopxl_tools.md
      - 系统集成: gopxl_integration.md
  - 3️⃣ 高级功能:
      - AI 工具介绍: gopxl_ai.md
      - Python 脚本与 GDK: gopxl_pythontools.md
      - 多传感器标定: gopxl_multisensors.md
      - 机器人标定: gopxl_robotcalibration.md

theme:
  name: material
  language: zh 
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  
  features:
    - navigation.top          
    - navigation.tracking     
    - search.suggest          
    - search.highlight        
    - content.code.copy       
    - navigation.expand
    - content.tabs.link # 增加：点击 Tab 时自动同步其他页面的相同 Tab

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - md_in_html
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true # 必须开启，否则 Tab 样式可能崩坏
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - glightbox:
      touchNavigation: true
      loop: true
      effect: zoom # 增加：放大效果更自然